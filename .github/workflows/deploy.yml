name: CI/CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Test ───────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && 'https://office.speednetkhulna.com/api' || 'http://localhost:5000' }}

      - name: Upload client build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          if-no-files-found: error

      - name: Check for secrets accidentally committed
        run: |
          if grep -r "eyJhbGciOiJ" . --include="*.txt" --include="*.log" 2>/dev/null | grep -v ".git"; then
            echo "❌ JWT token found in committed files!"
            exit 1
          fi
          echo "✅ No exposed secrets found"

  # ─── Deploy to Production ──────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download client build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Upload frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 21098
          source: "client/dist,ops/office_spa.htaccess,ops/proxy.php"
          target: "/home/speeuvmq/office_deploy_uploads/${{ github.run_id }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 21098
          script: |
            set -euo pipefail
            APP_DIR="/home/speeuvmq/office_app"
            OFFICE_DOMAIN_ROOT="/home/speeuvmq/office.speednetkhulna.com"
            UPLOAD_DIR="/home/speeuvmq/office_deploy_uploads/${{ github.run_id }}"
            REPO_URL="https://github.com/jonyspeednet-alt/office-speednetkhulna-com.git"

            if [ -d "$APP_DIR/.git" ]; then
              echo "Pulling latest code..."
              cd "$APP_DIR" && git fetch origin && git reset --hard origin/main
            elif [ -d "$APP_DIR" ]; then
              echo "Folder exists but not a git repo - initializing..."
              cd "$APP_DIR"
              git init
              git remote add origin "$REPO_URL"
              git fetch origin
              git reset --hard origin/main
            else
              echo "Fresh clone..."
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            echo "Installing server dependencies..."
            cd "$APP_DIR/server"
            PUPPETEER_SKIP_DOWNLOAD=1 npm ci --omit=dev --no-audit --no-fund

            echo "Publishing frontend..."
            test -f "$UPLOAD_DIR/client/dist/index.html"
            mkdir -p "$OFFICE_DOMAIN_ROOT/assets"
            mkdir -p "$APP_DIR/client/dist/assets"
            cp "$UPLOAD_DIR/client/dist/index.html" "$APP_DIR/client/dist/index.html"
            cp -a "$UPLOAD_DIR/client/dist/assets/." "$APP_DIR/client/dist/assets/"
            cp "$UPLOAD_DIR/client/dist/index.html" "$OFFICE_DOMAIN_ROOT/index.html"
            cp -a "$UPLOAD_DIR/client/dist/assets/." "$OFFICE_DOMAIN_ROOT/assets/"
            [ -f "$UPLOAD_DIR/client/dist/logo-b.png" ] && cp "$UPLOAD_DIR/client/dist/logo-b.png" "$OFFICE_DOMAIN_ROOT/logo-b.png" || true
            [ -f "$UPLOAD_DIR/client/dist/brand-logo.svg" ] && cp "$UPLOAD_DIR/client/dist/brand-logo.svg" "$OFFICE_DOMAIN_ROOT/brand-logo.svg" || true
            [ -f "$UPLOAD_DIR/ops/office_spa.htaccess" ] && cp "$UPLOAD_DIR/ops/office_spa.htaccess" "$OFFICE_DOMAIN_ROOT/.htaccess" || true
            [ -f "$UPLOAD_DIR/ops/proxy.php" ] && cp "$UPLOAD_DIR/ops/proxy.php" "$OFFICE_DOMAIN_ROOT/proxy.php" || true

            echo "Restarting PM2 processes..."
            cd "$APP_DIR"
            pm2 reload ecosystem.config.js --only office-api-a,office-api-b --env production || pm2 start ecosystem.config.js --only office-api-a,office-api-b --env production

            echo "Deployment complete!"
      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful to production"
          else
            echo "❌ Deployment failed"
          fi
