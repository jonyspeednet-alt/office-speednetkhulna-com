name: CI/CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Test ───────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

      - name: Check for secrets accidentally committed
        run: |
          if grep -r "eyJhbGciOiJ" . --include="*.txt" --include="*.log" 2>/dev/null | grep -v ".git"; then
            echo "❌ JWT token found in committed files!"
            exit 1
          fi
          echo "✅ No exposed secrets found"

  # ─── Deploy to Production ──────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /var/www/office-speednetkhulna-com

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "📦 Installing server dependencies..."
            cd server && npm ci --omit=dev && cd ..

            echo "🏗️ Building client..."
            cd client && npm ci && npm run build && cd ..

            echo "🔄 Restarting PM2 processes..."
            pm2 reload ecosystem.config.js --env production

            echo "✅ Deployment complete!"

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful to production"
          else
            echo "❌ Deployment failed"
          fi
